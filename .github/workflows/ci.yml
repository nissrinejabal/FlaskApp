name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ÉTAPE 1 : Les tests unitaires
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  # ÉTAPE 2 : Construction et Push (Uniquement si les tests réussissent)
  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests] # Cette ligne garantit que l'image est testée AVANT d'être poussée
    if: github.event_name == 'push' # Optionnel : ne pousse que lors d'un push réel sur main
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Utilisation des secrets pour la sécurité
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        run: |
          # Construction avec votre nom d'utilisateur Docker Hub
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .
          # Envoi de l'image sur le registre officiel
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest