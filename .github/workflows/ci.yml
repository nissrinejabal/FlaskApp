name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request: # Déclenchement lors d'une Pull Request (Consigne TP)
    branches: [main]

jobs:
  # Job 1 : Tests unitaires
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  # Job 2 : Construction Docker (en parallèle des tests)
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t flask-app .

  # Job 3 : Push vers Docker Hub (Uniquement si les tests réussissent)
  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests] # Condition de succès des tests (Consigne TP)
    if: github.event_name == 'push' # Ne pousse que lors d'un push réel
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest