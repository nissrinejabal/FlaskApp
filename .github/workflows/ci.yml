name: Multi-Registry Push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # --- CONNEXION AU PREMIER REGISTRE (Docker Hub) ---
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- CONNEXION AU DEUXIÈME REGISTRE (Exemple: GHCR) ---
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- CONSTRUCTION ET DOUBLE PUSH ---
      - name: Build and Push to Multiple Registries
        run: |
          # 1. On construit l'image localement une seule fois
          docker build -t flask-app-local .

          # 2. On tague et on pousse vers Docker Hub
          docker tag flask-app-local ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

          # 3. On tague et on pousse vers GitHub Packages (ou autre registre privé)
          # Note: l'URL du registre doit être incluse dans le tag
          docker tag flask-app-local ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest