name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main] # Déclenchement aussi sur Pull Request

jobs:
  # JOB 1 : Exécuter les tests unitaires
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  # JOB 2 : Construction Docker en parallèle
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t flask-app .

  # JOB 3 : Push vers Docker Hub (uniquement si les tests réussissent)
  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests] # Condition : Les tests DOIVENT avoir réussi
    if: github.event_name == 'push' # Optionnel : ne push que sur un vrai commit
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Multiple Registries (Docker Hub + Autre)
        run: |
          # Tag et Push pour Docker Hub
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
          
          # Exemple pour un second registre (ex: GitHub Packages)
          # docker tag flask-app ghcr.io/votre-nom/flask-app:latest
          # docker push ghcr.io/votre-nom/flask-app:latest